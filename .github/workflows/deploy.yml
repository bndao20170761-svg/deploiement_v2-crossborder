name: CI/CD Pipeline - Microservices PVVIH

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

env:
  DOCKER_REGISTRY: docker.io
  DOCKER_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}

jobs:
  # ==================== Build Backend Services ====================
  build-backends:
    name: Build Backend Services
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - name: api-register
            path: api_register
            port: 8761
          - name: api-configuration
            path: api_configuration/demo
            port: 8888
          - name: gateway-pvvih
            path: Getway_PVVIH
            port: 8080
          - name: forum-pvvih
            path: Forum_PVVIH
            port: 9092
          - name: gestion-user
            path: gestion_user
            port: 9089
          - name: gestion-reference
            path: gestion_reference
            port: 9090
          - name: gestion-patient
            path: gestion_patient
            port: 9091
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build with Maven
        working-directory: ${{ matrix.service.path }}
        run: mvn clean package -DskipTests -B

      - name: Run tests
        working-directory: ${{ matrix.service.path }}
        run: mvn test -B

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.service.name }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service.path }}
          file: ${{ matrix.service.path }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.service.name }}:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.service.name }}:buildcache,mode=max

  # ==================== Build Frontend Services ====================
  build-frontends:
    name: Build Frontend Services
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - name: gestion-forum-front
            path: gestion_forum_front
            port: 3001
          - name: a-reference-front
            path: a_reference_front
            port: 3002
          - name: a-user-front
            path: a_user_front
            port: 3003
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: ${{ matrix.service.path }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ matrix.service.path }}
        run: npm ci

      - name: Run tests
        working-directory: ${{ matrix.service.path }}
        run: npm test -- --passWithNoTests --watchAll=false

      - name: Build application
        working-directory: ${{ matrix.service.path }}
        run: npm run build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.service.name }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service.path }}
          file: ${{ matrix.service.path }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.service.name }}:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.service.name }}:buildcache,mode=max

  # ==================== Deploy to Production ====================
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build-backends, build-frontends]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create deployment summary
        run: |
          echo "## 🚀 Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Backend Services" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ api-register" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ api-configuration" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ gateway-pvvih" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ forum-pvvih" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ gestion-user" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ gestion-reference" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ gestion-patient" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Frontend Services" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ gestion-forum-front" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ a-reference-front" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ a-user-front" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Docker Hub" >> $GITHUB_STEP_SUMMARY
          echo "All images pushed to: \`${{ secrets.DOCKERHUB_USERNAME }}\`" >> $GITHUB_STEP_SUMMARY

      - name: Notify deployment success
        run: |
          echo "✅ Deployment completed successfully!"
          echo "Images are available on Docker Hub"

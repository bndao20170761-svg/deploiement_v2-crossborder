# Configuration des services de traduction

# Google Translate API
translation.google.api-key=${GOOGLE_TRANSLATE_API_KEY:}
translation.google.enabled=true

# LibreTranslate (auto-hébergé)
translation.libre.url=${LIBRE_TRANSLATE_URL:http://localhost:5000}
translation.libre.enabled=true

# Cache des traductions
translation.cache.enabled=true
translation.cache.ttl=86400

# Langues supportées
translation.supported-languages=fr,en,pt

# Configuration par défaut
translation.default-source-language=fr
translation.default-target-language=en

# Limites
translation.max-text-length=5000
translation.rate-limit.requests-per-minute=60













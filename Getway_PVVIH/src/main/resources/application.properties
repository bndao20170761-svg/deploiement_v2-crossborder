# Application properties - minimal config
# Main configuration is loaded from Spring Cloud Config Server
# See bootstrap.properties for Config Server connection details
spring.application.name=GETWAY_PVVIH

spring.config.import=optional:configserver:http://api-configuration:8888
spring.cloud.config.enabled=true
spring.cloud.config.import-check.enabled=false

# Fallback Eureka configuration (in case Config Server is not available)
eureka.client.service-url.defaultZone=http://api-register:8761/eureka/
eureka.instance.prefer-ip-address=true
